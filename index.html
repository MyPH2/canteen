<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#130505" />
  <title>Universal Restaurant</title>
  <style>
    :root {
      --bg-0: #080202;
      --bg-1: #120404;
      --bg-2: #210807;
      --panel: rgba(95, 16, 10, 0.96);
      --panel-strong: rgba(74, 12, 8, 0.98);
      --gold: #f3ca73;
      --gold-soft: #f5d79b;
      --gold-deep: #b57a22;
      --red: #b51f15;
      --red-strong: #ff431f;
      --text: #f8e8bf;
      --line: rgba(245, 200, 120, 0.65);
      --shadow: rgba(0, 0, 0, 0.45);
      --font-serif: Georgia, "Times New Roman", serif;
      --font-display: "Times New Roman", Georgia, serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100svh;
      font-family: var(--font-serif);
      color: var(--text);
      background:
        radial-gradient(circle at 50% 10%, rgba(176, 24, 10, 0.22), transparent 24%),
        radial-gradient(circle at 50% 35%, rgba(255, 91, 34, 0.14), transparent 20%),
        radial-gradient(circle at 50% 100%, rgba(174, 37, 18, 0.18), transparent 20%),
        linear-gradient(180deg, #170605 0%, #090202 42%, #140505 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 14% 12%, rgba(210, 45, 30, 0.18) 0 1.5px, transparent 2px),
        radial-gradient(circle at 18% 15%, rgba(224, 91, 70, 0.18) 0 6px, transparent 7px),
        radial-gradient(circle at 30% 8%, rgba(255, 90, 36, 0.12) 0 1.5px, transparent 2px),
        radial-gradient(circle at 85% 20%, rgba(255, 190, 88, 0.15) 0 1px, transparent 2px),
        radial-gradient(circle at 72% 68%, rgba(239, 204, 116, 0.08) 0 1px, transparent 2px),
        radial-gradient(circle at 10% 80%, rgba(145, 26, 10, 0.16) 0 1px, transparent 2px);
      opacity: 0.6;
      mix-blend-mode: screen;
    }

    body::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.65) 0%, transparent 15%, transparent 85%, rgba(0, 0, 0, 0.65) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.15), transparent 14%, transparent 86%, rgba(0, 0, 0, 0.2));
      box-shadow: inset 0 0 90px rgba(0, 0, 0, 0.72);
    }

    .app {
      position: relative;
      min-height: 100svh;
      padding: calc(16px + env(safe-area-inset-top)) 14px calc(22px + env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
    }

    .page {
      position: relative;
      width: min(100%, 430px);
      isolation: isolate;
    }

    .page__glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 72, 34, 0.28), transparent 18%),
        radial-gradient(circle at 50% 46%, rgba(158, 19, 10, 0.2), transparent 24%),
        radial-gradient(circle at 50% 78%, rgba(255, 195, 96, 0.08), transparent 18%);
      filter: blur(16px);
      opacity: 0.85;
      z-index: -2;
    }

    .ornament-strip {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .ornament-strip::before,
    .ornament-strip::after {
      content: "";
      position: absolute;
      top: 0;
      width: 170px;
      height: 170px;
      border: 2px solid rgba(190, 137, 40, 0.28);
      border-radius: 50%;
      background:
        repeating-linear-gradient(90deg, transparent 0 24px, rgba(210, 155, 46, 0.24) 24px 26px),
        repeating-linear-gradient(0deg, transparent 0 24px, rgba(210, 155, 46, 0.24) 24px 26px);
      box-shadow: 0 0 28px rgba(255, 183, 75, 0.06);
      opacity: 0.55;
    }

    .ornament-strip::before {
      left: -122px;
      top: 252px;
    }

    .ornament-strip::after {
      right: -122px;
      top: 252px;
    }

    .lantern {
      position: absolute;
      right: -16px;
      top: 34px;
      width: 92px;
      height: 196px;
      pointer-events: none;
      z-index: -1;
      opacity: 0.96;
      filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.5));
    }

    .lantern__cap {
      position: absolute;
      left: 20px;
      top: 0;
      width: 52px;
      height: 26px;
      border-radius: 20px 20px 16px 16px;
      background: linear-gradient(180deg, #5f3004, #a77215 38%, #3f1f02 100%);
      border: 1px solid rgba(255, 214, 124, 0.35);
    }

    .lantern__body {
      position: absolute;
      left: 10px;
      top: 16px;
      width: 72px;
      height: 134px;
      border-radius: 38px 38px 44px 44px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.12), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.12)),
        linear-gradient(180deg, #cf2f17 0%, #8b0f07 34%, #d24a25 64%, #7d0904 100%);
      border: 1px solid rgba(255, 219, 139, 0.26);
      box-shadow: inset 0 0 24px rgba(255, 248, 208, 0.08), 0 0 18px rgba(255, 91, 34, 0.18);
      overflow: hidden;
    }

    .lantern__body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(180deg, rgba(0, 0, 0, 0.13) 0 1px, transparent 1px 12px);
      opacity: 0.6;
      mix-blend-mode: multiply;
    }

    .lantern__body::after {
      content: "UNIVERSAL";
      position: absolute;
      left: 50%;
      top: 50px;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255, 237, 183, 0.85);
      text-shadow: 0 0 10px rgba(255, 188, 75, 0.35);
      white-space: nowrap;
    }

    .lantern__tassel {
      position: absolute;
      left: 50%;
      top: 136px;
      transform: translateX(-50%);
      width: 10px;
      height: 52px;
      background:
        linear-gradient(180deg, #ee5a2c, #f1b037 28%, #8f1107 65%, #e9512a 100%);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(245, 136, 63, 0.38);
    }

    .lantern__tassel::before,
    .lantern__tassel::after {
      content: "";
      position: absolute;
      left: -8px;
      right: -8px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(248, 202, 104, 0.82), transparent);
    }

    .lantern__tassel::before {
      top: 14px;
    }

    .lantern__tassel::after {
      top: 30px;
    }

    .lantern__skirt {
      position: absolute;
      left: 19px;
      top: 148px;
      width: 52px;
      height: 18px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 204, 98, 0.86) 0 3px, rgba(120, 27, 8, 0.95) 3px 7px);
      border-radius: 0 0 12px 12px;
      filter: saturate(1.1);
    }

    .hero {
      position: relative;
      padding-top: 10px;
      padding-bottom: 4px;
    }

    .seal {
      position: relative;
      width: 162px;
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #fff 0 43%, #f8f8f8 43% 44%, #fff 44% 100%);
      border: 5px solid #d31d14;
      box-shadow:
        0 0 0 4px rgba(255, 255, 255, 0.85),
        0 10px 24px rgba(0, 0, 0, 0.35),
        0 0 32px rgba(255, 91, 34, 0.22);
      overflow: hidden;
      animation: sealFloat 7s ease-in-out infinite;
    }

    .seal::before,
    .seal::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 2px solid rgba(209, 17, 11, 0.9);
      clip-path: polygon(0 0, 100% 0, 100% 10%, 90% 10%, 90% 90%, 100% 90%, 100% 100%, 0 100%);
      opacity: 0.45;
    }

    .seal::after {
      inset: 21px;
      border-width: 1.5px;
      clip-path: inset(0);
      opacity: 0.28;
    }

    .seal__inner {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      text-align: center;
      color: #121212;
      font-family: var(--font-display);
      font-weight: 900;
      line-height: 0.94;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .seal__inner span {
      display: block;
      font-size: 17px;
      line-height: 0.92;
    }

    .seal__ornament {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 24px;
      color: #cd1c15;
      font-size: 28px;
      font-weight: 900;
      line-height: 24px;
      text-align: center;
      letter-spacing: 0.2em;
    }

    .seal__ornament--top {
      top: 4px;
    }

    .seal__ornament--bottom {
      bottom: 4px;
      transform: translateX(-50%) rotate(180deg);
    }

    .brand-title {
      margin: 20px auto 0;
      text-align: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2.55rem, 9.6vw, 4rem);
      line-height: 0.84;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: transparent;
      background: linear-gradient(180deg, #f8e4b1 0%, #e0bf73 38%, #c98d2c 58%, #f9e8bb 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.55), 0 0 16px rgba(255, 183, 67, 0.08);
      animation: titleGlow 6s ease-in-out infinite;
    }

    .divider {
      width: 80%;
      margin: 18px auto 8px;
      position: relative;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(228, 183, 95, 0.9), transparent);
    }

    .divider__mark {
      width: 26px;
      height: 10px;
      margin: 0 10px;
      position: relative;
    }

    .divider__mark::before,
    .divider__mark::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 10px;
      height: 1.5px;
      background: rgba(228, 183, 95, 0.92);
    }

    .divider__mark::before {
      left: 0;
      transform: translateY(-50%) rotate(22deg);
      transform-origin: left center;
    }

    .divider__mark::after {
      right: 0;
      transform: translateY(-50%) rotate(-22deg);
      transform-origin: right center;
    }

    .taglines {
      text-align: center;
      text-transform: uppercase;
      color: #f7e5b9;
      font-size: clamp(1rem, 4vw, 1.3rem);
      line-height: 1.28;
      letter-spacing: 0.11em;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
    }

    .contact-strip {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      background:
        linear-gradient(180deg, rgba(109, 21, 12, 0.98), rgba(82, 13, 8, 0.98));
      border: 1.5px solid rgba(244, 191, 86, 0.85);
      border-radius: 18px;
      box-shadow:
        inset 0 0 0 1px rgba(255, 223, 142, 0.18),
        0 12px 26px rgba(0, 0, 0, 0.45);
      position: relative;
      overflow: hidden;
    }

    .contact-strip::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 14px;
      border: 1px solid rgba(248, 196, 89, 0.34);
      pointer-events: none;
    }

    .contact-item {
      position: relative;
      padding: 18px 12px 16px;
      text-align: center;
      color: #f6e2ba;
      text-decoration: none;
      min-height: 124px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .contact-item + .contact-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 14px;
      bottom: 14px;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(247, 210, 123, 0.72), transparent);
    }

    .contact-icon {
      width: 28px;
      height: 28px;
      margin: 0 auto;
      color: var(--gold-soft);
      filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.45));
    }

    .contact-text {
      font-size: 0.95rem;
      line-height: 1.25;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.45);
      white-space: pre-line;
    }

    .contact-item:first-child .contact-text {
      font-size: 0.83rem;
    }

    .contact-item:nth-child(2) .contact-text {
      font-size: 0.9rem;
    }

    .contact-item:nth-child(3) .contact-text {
      font-size: 0.88rem;
    }

    .cards {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .action-card {
      position: relative;
      min-height: 264px;
      padding: 22px 14px 16px;
      border-radius: 20px;
      border: 1.5px solid rgba(244, 191, 86, 0.86);
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 169, 92, 0.16), transparent 45%),
        linear-gradient(180deg, rgba(136, 28, 18, 0.96), rgba(88, 15, 10, 0.99));
      box-shadow:
        inset 0 0 0 1px rgba(255, 223, 142, 0.15),
        0 14px 26px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      color: #f7e7bc;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      appearance: none;
    }

    .action-card::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 16px;
      border: 1px solid rgba(245, 184, 63, 0.45);
      pointer-events: none;
    }

    .action-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), transparent 50%);
      pointer-events: none;
    }

    .action-icon {
      width: 66px;
      height: 66px;
      color: #f1cf7a;
      margin-top: 6px;
      flex: 0 0 auto;
      filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.4));
    }

    .action-title {
      margin-top: 14px;
      font-family: var(--font-display);
      font-size: clamp(1.55rem, 5.2vw, 1.95rem);
      line-height: 1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #f7d890;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
    }

    .action-desc {
      margin-top: 12px;
      font-size: 1.02rem;
      line-height: 1.35;
      color: #f8e6c2;
      min-height: 82px;
      max-width: 15ch;
      text-wrap: balance;
    }

    .circle-arrow {
      margin-top: auto;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1.5px solid #efc85e;
      display: grid;
      place-items: center;
      color: #efc85e;
      background: rgba(0, 0, 0, 0.16);
      box-shadow: inset 0 0 0 1px rgba(255, 238, 189, 0.08);
    }

    .follow {
      margin-top: 22px;
      text-align: center;
    }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      color: #f6d99a;
      font-size: 1.05rem;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
      white-space: nowrap;
    }

    .section-heading::before,
    .section-heading::after {
      content: "";
      width: 76px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(242, 202, 115, 0.92), transparent);
      flex: 1;
    }

    .section-heading__mark {
      width: 20px;
      height: 12px;
      position: relative;
      flex: 0 0 auto;
    }

    .section-heading__mark::before,
    .section-heading__mark::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 8px;
      height: 1.5px;
      background: rgba(242, 202, 115, 0.95);
    }

    .section-heading__mark::before {
      left: 0;
      transform: translateY(-50%) rotate(22deg);
      transform-origin: left center;
    }

    .section-heading__mark::after {
      right: 0;
      transform: translateY(-50%) rotate(-22deg);
      transform-origin: right center;
    }

    .social-row {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .social-link {
      text-decoration: none;
      color: #f7e7c2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
    }

    .social-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid #c99537;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.12), transparent 35%),
        linear-gradient(180deg, rgba(36, 36, 40, 0.95), rgba(12, 12, 16, 0.99));
      box-shadow:
        inset 0 0 0 1px rgba(255, 245, 199, 0.12),
        0 10px 18px rgba(0, 0, 0, 0.35);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .social-circle--instagram {
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.16), transparent 34%),
        linear-gradient(135deg, #feda75 0%, #fa7e1e 28%, #d62976 55%, #962fbf 78%, #4f5bd5 100%);
    }

    .social-circle--facebook {
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.16), transparent 34%),
        linear-gradient(180deg, #3f7ee8 0%, #2c59bf 100%);
    }

    .social-label {
      font-size: 1rem;
      line-height: 1.2;
    }

    .cta {
      margin-top: 16px;
      width: 100%;
      min-height: 60px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 18px;
      border: 1.5px solid rgba(244, 191, 86, 0.86);
      box-shadow:
        inset 0 0 0 1px rgba(255, 223, 142, 0.13),
        0 12px 22px rgba(0, 0, 0, 0.36);
      text-decoration: none;
      color: #f5e1ae;
      -webkit-tap-highlight-color: transparent;
    }

    .cta--whatsapp {
      background:
        radial-gradient(circle at 50% 0%, rgba(155, 255, 157, 0.18), transparent 42%),
        linear-gradient(180deg, rgba(23, 87, 38, 0.98), rgba(11, 52, 23, 0.98));
    }

    .cta--navigate {
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 166, 95, 0.12), transparent 42%),
        linear-gradient(180deg, rgba(97, 18, 11, 0.98), rgba(67, 12, 8, 0.98));
    }

    .cta__icon {
      width: 36px;
      height: 36px;
      flex: 0 0 auto;
      color: currentColor;
    }

    .cta__body {
      flex: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .cta__title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 5.4vw, 1.95rem);
      line-height: 1.05;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .cta__subtitle {
      font-size: 0.96rem;
      line-height: 1.2;
      color: #f4deaf;
    }

    .menu-sheet {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0, 0, 0, 0.56);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.24s ease;
      z-index: 40;
    }

    .menu-sheet.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .menu-panel {
      width: min(100%, 430px);
      max-height: 84svh;
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(180deg, rgba(35, 10, 6, 0.99), rgba(18, 6, 4, 0.99));
      border: 1px solid rgba(244, 191, 86, 0.45);
      border-bottom: 0;
      border-radius: 22px 22px 0 0;
      overflow: hidden;
      box-shadow: 0 -18px 36px rgba(0, 0, 0, 0.55);
      transform: translateY(100%);
      transition: transform 0.28s ease;
    }

    .menu-sheet.is-open .menu-panel {
      transform: translateY(0);
    }

    .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(244, 191, 86, 0.16);
      background: linear-gradient(180deg, rgba(37, 11, 6, 0.98), rgba(24, 7, 5, 0.96));
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .menu-tabs {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu-tab {
      border: 1px solid rgba(244, 191, 86, 0.48);
      background: rgba(255, 255, 255, 0.03);
      color: #f6dfad;
      border-radius: 999px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    .menu-tab.is-active {
      background: rgba(244, 191, 86, 0.14);
      color: #ffe7b7;
    }

    .menu-close {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(244, 191, 86, 0.48);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      color: #f7e7c3;
      display: grid;
      place-items: center;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .menu-content {
      padding: 16px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .menu-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: #f7d992;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .menu-subtitle {
      margin: 6px 0 18px;
      color: #f0ddb7;
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .menu-section {
      margin-bottom: 16px;
      padding: 14px 14px 8px;
      border: 1px solid rgba(244, 191, 86, 0.2);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
    }

    .menu-section h4 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: #f7e1af;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      padding: 9px 0;
      border-bottom: 1px dashed rgba(244, 191, 86, 0.14);
      color: #f6e6be;
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .menu-item:last-child {
      border-bottom: 0;
    }

    .menu-item__name {
      flex: 1;
    }

    .menu-item__note {
      color: rgba(247, 229, 184, 0.74);
      font-size: 0.88rem;
      text-align: right;
      white-space: nowrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(16px);
      background: rgba(18, 6, 4, 0.92);
      color: #f8e6c1;
      border: 1px solid rgba(244, 191, 86, 0.48);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.92rem;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.38);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 50;
      max-width: min(92vw, 420px);
      text-align: center;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .icon-fit {
      width: 100%;
      height: 100%;
      display: block;
      fill: currentColor;
    }

    .icon-stroke {
      width: 100%;
      height: 100%;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes titleGlow {
      0%, 100% {
        filter: drop-shadow(0 0 0 rgba(255, 183, 67, 0));
      }
      50% {
        filter: drop-shadow(0 0 12px rgba(255, 183, 67, 0.09));
      }
    }

    @keyframes sealFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @media (max-width: 390px) {
      .contact-item {
        padding-inline: 8px;
      }

      .contact-text {
        font-size: 1rem;
      }

      .action-desc {
        font-size: 0.96rem;
      }

      .social-circle {
        width: 82px;
        height: 82px;
      }
    }

    @media (max-width: 360px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .contact-strip {
        grid-template-columns: 1fr;
      }

      .contact-item + .contact-item::before {
        left: 14px;
        right: 14px;
        top: 0;
        bottom: auto;
        width: auto;
        height: 1px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="page" aria-label="Universal Restaurant poster">
      <div class="page__glow"></div>
      <div class="ornament-strip"></div>
      <div class="lantern" aria-hidden="true">
        <div class="lantern__cap"></div>
        <div class="lantern__body"></div>
        <div class="lantern__skirt"></div>
        <div class="lantern__tassel"></div>
      </div>

      <section class="hero">
        <div class="seal" aria-label="Universal Restaurant logo">
          <div class="seal__ornament seal__ornament--top">※※※</div>
          <div class="seal__inner">
            <span data-bind="brand.sealLine1">UNIVERSAL</span>
            <span data-bind="brand.sealLine2">RESTAURANT</span>
          </div>
          <div class="seal__ornament seal__ornament--bottom">※※※</div>
        </div>

        <h1 class="brand-title" data-bind="brand.title"></h1>

        <div class="divider" aria-hidden="true">
          <span class="divider__mark"></span>
        </div>

        <p class="taglines">
          <span data-bind="brand.taglineTop"></span><br />
          <span data-bind="brand.taglineBottom"></span>
        </p>
      </section>

      <section class="contact-strip" aria-label="Contact details">
        <a class="contact-item" data-bind-href="contact.addressUrl" data-tap-target="map" href="#" rel="noopener">
          <div class="contact-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="icon-fit">
              <path d="M12 21s6-6.2 6-11a6 6 0 0 0-12 0c0 4.8 6 11 6 11Z"></path>
              <circle cx="12" cy="10" r="2.5"></circle>
            </svg>
          </div>
          <div class="contact-text">
            <span data-bind="contact.addressLine1"></span><br />
            <span data-bind="contact.addressLine2"></span>
          </div>
        </a>

        <a class="contact-item" data-bind-href="contact.phoneUrl" data-tap-target="phone" href="#" rel="noopener">
          <div class="contact-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="icon-fit">
              <path d="M7.8 4.8 9.9 7a1.7 1.7 0 0 1 .1 2.2l-1.2 1.7c1 2.1 2.8 3.9 4.9 4.9l1.7-1.2a1.7 1.7 0 0 1 2.2.1l2.2 2.1a1.7 1.7 0 0 1 .1 2.4c-.9 1-2.1 1.8-3.5 1.8-6.7 0-12.1-5.4-12.1-12.1 0-1.4.7-2.6 1.8-3.5a1.7 1.7 0 0 1 2.4.1Z"></path>
            </svg>
          </div>
          <div class="contact-text">
            <span data-bind="contact.phoneLabel"></span><br />
            <span data-bind="contact.phoneNumber"></span>
          </div>
        </a>

        <div class="contact-item" aria-label="Opening hours">
          <div class="contact-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="icon-stroke">
              <circle cx="12" cy="12" r="8.7"></circle>
              <path d="M12 7.2v5.1l3.6 2.1"></path>
              <path d="M12 3.6v2.1"></path>
              <path d="M12 18.3v2.1"></path>
            </svg>
          </div>
          <div class="contact-text" data-bind="contact.hours"></div>
        </div>
      </section>

      <section class="cards" aria-label="Primary actions">
        <button class="action-card" type="button" data-open-menu="dineIn">
          <div class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" class="icon-stroke">
              <path d="M18 14v36"></path>
              <path d="M46 14v36"></path>
              <path d="M22 23h20"></path>
              <path d="M18 36h28"></path>
              <path d="M22 50v-13"></path>
              <path d="M42 50v-13"></path>
              <path d="M27 23c0 4 3 8 5 8s5-4 5-8"></path>
            </svg>
          </div>
          <div class="action-title" data-bind="cards.dineIn.title"></div>
          <div class="action-desc" data-bind="cards.dineIn.description"></div>
          <div class="circle-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="icon-stroke">
              <path d="M8 12h8"></path>
              <path d="M13 7l5 5-5 5"></path>
            </svg>
          </div>
        </button>

        <button class="action-card" type="button" data-open-menu="takeOut">
          <div class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" class="icon-stroke">
              <path d="M20 24h24l-2 22H22l-2-22Z"></path>
              <path d="M25 24v-6a7 7 0 0 1 14 0v6"></path>
              <path d="M24 34l8 8 8-8"></path>
            </svg>
          </div>
          <div class="action-title" data-bind="cards.takeOut.title"></div>
          <div class="action-desc" data-bind="cards.takeOut.description"></div>
          <div class="circle-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="icon-stroke">
              <path d="M8 12h8"></path>
              <path d="M13 7l5 5-5 5"></path>
            </svg>
          </div>
        </button>
      </section>

      <section class="follow" aria-label="Follow us">
        <div class="section-heading">
          <span class="section-heading__mark" aria-hidden="true"></span>
          <span data-bind="social.heading"></span>
          <span class="section-heading__mark" aria-hidden="true"></span>
        </div>

        <div class="social-row">
          <a class="social-link" data-social-link="0" href="#" target="_blank" rel="noopener">
            <div class="social-circle" aria-hidden="true">
              <svg viewBox="0 0 64 64" class="icon-fit" id="icon-tiktok">
                <path d="M39 14c2 5 6 8 11 9v8c-4 0-7-1-10-3v12c0 8-6 14-14 14s-14-6-14-14 6-14 14-14c1 0 2 0 3 .2v8.3c-1-.5-2-.7-3-.7-4 0-7 3-7 7s3 7 7 7 7-3 7-7V14h6Z"></path>
                <path d="M41 14c1 3 4 6 9 7v5c-4 0-8-2-11-5V14h2Z" opacity=".45"></path>
              </svg>
            </div>
            <div class="social-label" data-bind="social.items.0.label"></div>
          </a>

          <a class="social-link" data-social-link="1" href="#" target="_blank" rel="noopener">
            <div class="social-circle social-circle--instagram" aria-hidden="true">
              <svg viewBox="0 0 64 64" class="icon-fit">
                <rect x="15" y="15" width="34" height="34" rx="10" ry="10" fill="none" stroke="white" stroke-width="4"></rect>
                <circle cx="32" cy="32" r="9" fill="none" stroke="white" stroke-width="4"></circle>
                <circle cx="42.5" cy="20.5" r="3.3" fill="white"></circle>
              </svg>
            </div>
            <div class="social-label" data-bind="social.items.1.label"></div>
          </a>

          <a class="social-link" data-social-link="2" href="#" target="_blank" rel="noopener">
            <div class="social-circle social-circle--facebook" aria-hidden="true">
              <svg viewBox="0 0 64 64" class="icon-fit">
                <path fill="white" d="M36 18c-4 0-6 2.4-6 6.7V29h-5v8h5v19h8V37h6l1-8h-7v-3.6c0-1.4.4-2.4 2.2-2.4H45v-7.2C43.7 18.1 39.8 18 36 18Z"></path>
              </svg>
            </div>
            <div class="social-label" data-bind="social.items.2.label"></div>
          </a>
        </div>
      </section>

      <a class="cta cta--whatsapp" data-bind-href="cta.whatsappUrl" data-tap-target="whatsapp" href="#" rel="noopener">
        <div class="cta__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" class="icon-stroke">
            <path d="M20.1 12.1c0 4.4-3.5 7.9-8 7.9-1.4 0-2.7-.3-3.8-.8L4 20l.9-4.1A7.9 7.9 0 0 1 4 12.1c0-4.4 3.6-8 8-8 4.5 0 8.1 3.6 8.1 8Z"></path>
            <path d="M10 9.6c.2-.3.5-.3.7-.1l1 1c.2.2.2.4.1.7l-.6.8c.6 1.1 1.4 1.9 2.5 2.5l.8-.6c.3-.1.5-.1.7.1l1 1c.2.2.2.5-.1.7-.5.6-1.1 1-1.8 1-3.5 0-6.4-2.9-6.4-6.4 0-.7.4-1.3 1-1.8Z"></path>
          </svg>
        </div>
        <div class="cta__body">
          <div class="cta__title" data-bind="cta.whatsappTitle"></div>
        </div>
      </a>

      <a class="cta cta--navigate" data-bind-href="cta.navigateUrl" data-tap-target="navigate" href="#" rel="noopener">
        <div class="cta__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" class="icon-stroke">
            <path d="M12 21s6-6.2 6-11a6 6 0 0 0-12 0c0 4.8 6 11 6 11Z"></path>
            <circle cx="12" cy="10" r="2.3"></circle>
          </svg>
        </div>
        <div class="cta__body">
          <div class="cta__title" data-bind="cta.navigateTitle"></div>
          <div class="cta__subtitle" data-bind="cta.navigateSubtitle"></div>
        </div>
      </a>
    </main>
  </div>

  <div class="menu-sheet" id="menu-sheet" aria-hidden="true">
    <div class="menu-panel" role="dialog" aria-modal="true" aria-labelledby="menu-title">
      <div class="menu-header">
        <div class="menu-tabs" role="tablist" aria-label="Menu tabs">
          <button class="menu-tab is-active" type="button" data-menu-tab="dineIn"></button>
          <button class="menu-tab" type="button" data-menu-tab="takeOut"></button>
        </div>
        <button class="menu-close" type="button" aria-label="Close menu">
          <svg viewBox="0 0 24 24" class="icon-stroke">
            <path d="M7 7l10 10"></path>
            <path d="M17 7 7 17"></path>
          </svg>
        </button>
      </div>
      <div class="menu-content">
        <h2 class="menu-title" id="menu-title"></h2>
        <p class="menu-subtitle" id="menu-subtitle"></p>
        <div id="menu-sections"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    const DATA_URL = './content.json';

    const el = {
      menuSheet: document.getElementById('menu-sheet'),
      menuTitle: document.getElementById('menu-title'),
      menuSubtitle: document.getElementById('menu-subtitle'),
      menuSections: document.getElementById('menu-sections'),
      toast: document.getElementById('toast'),
      menuTabs: Array.from(document.querySelectorAll('[data-menu-tab]')),
      closeMenu: document.querySelector('.menu-close'),
      bindTargets: Array.from(document.querySelectorAll('[data-bind]')),
      hrefTargets: Array.from(document.querySelectorAll('[data-bind-href]')),
      openMenuTargets: Array.from(document.querySelectorAll('[data-open-menu]')),
      socialLinks: Array.from(document.querySelectorAll('[data-social-link]')),
    };

    const state = {
      data: null,
      activeMenu: 'dineIn',
      toastTimer: null,
    };

    function getPath(obj, path) {
      return path.split('.').reduce((acc, key) => {
        if (acc == null) return undefined;
        return acc[key];
      }, obj);
    }

    function setTextBindings(data) {
      el.bindTargets.forEach((node) => {
        const value = getPath(data, node.dataset.bind);
        if (value != null) {
          node.textContent = String(value);
        }
      });
    }

    function setLinkBindings(data) {
      el.hrefTargets.forEach((node) => {
        const value = getPath(data, node.dataset.bindHref);
        if (typeof value === 'string' && value.length > 0) {
          node.href = value;
          node.removeAttribute('aria-disabled');
          node.classList.remove('is-disabled');
        } else {
          node.href = '#';
          node.setAttribute('aria-disabled', 'true');
          node.classList.add('is-disabled');
        }
      });

      el.socialLinks.forEach((node) => {
        const item = data.social.items?.[Number(node.dataset.socialLink)];
        if (item?.url) {
          node.href = item.url;
          node.removeAttribute('aria-disabled');
          node.classList.remove('is-disabled');
        } else {
          node.href = '#';
          node.setAttribute('aria-disabled', 'true');
          node.classList.add('is-disabled');
        }
      });
    }

    function renderMenu(menuKey) {
      const menu = state.data.menus[menuKey];
      if (!menu) return;

      state.activeMenu = menuKey;
      el.menuTabs.forEach((tab) => {
        tab.classList.toggle('is-active', tab.dataset.menuTab === menuKey);
      });

      el.menuTitle.textContent = menu.title;
      el.menuSubtitle.textContent = menu.subtitle;
      el.menuSections.innerHTML = '';

      menu.sections.forEach((section) => {
        const sectionEl = document.createElement('section');
        sectionEl.className = 'menu-section';

        const heading = document.createElement('h4');
        heading.textContent = section.title;
        sectionEl.appendChild(heading);

        section.items.forEach((item) => {
          const itemEl = document.createElement('div');
          itemEl.className = 'menu-item';

          const name = document.createElement('div');
          name.className = 'menu-item__name';
          name.textContent = item.name;

          const note = document.createElement('div');
          note.className = 'menu-item__note';
          note.textContent = item.note || '';

          itemEl.append(name, note);
          sectionEl.appendChild(itemEl);
        });

        el.menuSections.appendChild(sectionEl);
      });
    }

    function openMenu(menuKey) {
      renderMenu(menuKey);
      el.menuSheet.classList.add('is-open');
      el.menuSheet.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
      el.menuSheet.classList.remove('is-open');
      el.menuSheet.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function showToast(message) {
      window.clearTimeout(state.toastTimer);
      el.toast.textContent = message;
      el.toast.classList.add('is-visible');
      state.toastTimer = window.setTimeout(() => {
        el.toast.classList.remove('is-visible');
      }, 2200);
    }

    function wireInteractions(data) {
      el.openMenuTargets.forEach((node) => {
        node.addEventListener('click', () => openMenu(node.dataset.openMenu));
      });

      el.menuTabs.forEach((tab) => {
        tab.textContent = data.menus[tab.dataset.menuTab].title;
        tab.addEventListener('click', () => renderMenu(tab.dataset.menuTab));
      });

      el.closeMenu.addEventListener('click', closeMenu);
      el.menuSheet.addEventListener('click', (event) => {
        if (event.target === el.menuSheet) {
          closeMenu();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && el.menuSheet.classList.contains('is-open')) {
          closeMenu();
        }
      });

      document.querySelectorAll('[data-tap-target]').forEach((node) => {
        node.addEventListener('click', (event) => {
          if (node.classList.contains('is-disabled')) {
            event.preventDefault();
            showToast('Link is not configured yet. Update content.json.');
          }
        });
      });
    }

    function applyData(data) {
      state.data = data;
      setTextBindings(data);
      setLinkBindings(data);
      wireInteractions(data);
      renderMenu(state.activeMenu);
    }

    async function boot() {
      try {
        const response = await fetch(DATA_URL, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Failed to load ${DATA_URL}: ${response.status}`);
        }
        const data = await response.json();
        applyData(data);
      } catch (error) {
        console.error(error);
        el.toast.textContent = 'Unable to load content.json.';
        el.toast.classList.add('is-visible');
      }
    }

    boot();
  </script>
</body>
</html>
